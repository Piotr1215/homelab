---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-memory-api
  namespace: ai-tools
  labels:
    app.kubernetes.io/name: agent-memory-api
    app.kubernetes.io/instance: agent-memory-server
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-memory-api
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-memory-api
        app.kubernetes.io/instance: agent-memory-server
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: piotrzan/agent-memory-server:0.13.2-custom-v3
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: REDIS_URL
              value: redis://agent-memory-redis.ai-tools.svc:6379
            - name: PORT
              value: "8000"
            - name: LONG_TERM_MEMORY
              value: "true"
            - name: ENABLE_TOPIC_EXTRACTION
              value: "true"
            - name: ENABLE_NER
              value: "true"
            - name: DISABLE_AUTH
              value: "true"
            - name: GENERATION_MODEL
              value: ollama/llama3.2:3b
            - name: EMBEDDING_MODEL
              value: ollama/nomic-embed-text
            - name: OLLAMA_API_BASE
              value: http://ollama-mac.ai-tools.svc:11434
            - name: OPENAI_API_KEY
              value: "sk-dummy"
            - name: REDISVL_VECTOR_DIMENSIONS
              value: "768"
            - name: WINDOW_SIZE
              value: "12"
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: agent-memory-api
  namespace: ai-tools
  labels:
    app.kubernetes.io/name: agent-memory-api
    app.kubernetes.io/instance: agent-memory-server
    app.kubernetes.io/component: api
spec:
  selector:
    app.kubernetes.io/name: agent-memory-api
    app.kubernetes.io/component: api
  ports:
    - port: 8000
      targetPort: http
      name: http
