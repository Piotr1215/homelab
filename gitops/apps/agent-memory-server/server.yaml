---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: agent-memory-api
  namespace: ai-tools
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-memory-api
      app.kubernetes.io/component: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-memory-api
  namespace: ai-tools
  labels:
    app.kubernetes.io/name: agent-memory-api
    app.kubernetes.io/instance: agent-memory-server
    app.kubernetes.io/component: api
  annotations:
    descheduler.alpha.kubernetes.io/evict: "false"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-memory-api
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-memory-api
        app.kubernetes.io/instance: agent-memory-server
        app.kubernetes.io/component: api
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/instance: agent-memory-server
                topologyKey: kubernetes.io/hostname
      containers:
        - name: api
          image: piotrzan/agent-memory-server:latest-custom-v11
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: REDIS_URL
              value: redis://agent-memory-redis.ai-tools.svc:6379
            - name: PORT
              value: "8000"
            - name: LONG_TERM_MEMORY
              value: "true"
            - name: ENABLE_TOPIC_EXTRACTION
              value: "true"
            - name: ENABLE_NER
              value: "true"
            - name: DISABLE_AUTH
              value: "true"
            - name: GENERATION_MODEL
              value: anthropic/claude-sonnet-4-6
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-api-key
                  key: api-key
            - name: FAST_MODEL
              value: ollama/qwen2.5:7b
            - name: SLOW_MODEL
              value: ollama/qwen2.5:7b
            - name: EMBEDDING_MODEL
              value: ollama/nomic-embed-text
            - name: OLLAMA_API_BASE
              value: http://ollama-pc.ai-tools.svc:11434
            - name: OPENAI_API_KEY
              value: "sk-dummy"
            - name: REDISVL_VECTOR_DIMENSIONS
              value: "768"
            - name: COMPACT_SEMANTIC_DUPLICATES
              value: "false"
            - name: WINDOW_SIZE
              value: "12"
          startupProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: agent-memory-api
  namespace: ai-tools
  labels:
    app.kubernetes.io/name: agent-memory-api
    app.kubernetes.io/instance: agent-memory-server
    app.kubernetes.io/component: api
spec:
  selector:
    app.kubernetes.io/name: agent-memory-api
    app.kubernetes.io/component: api
  ports:
    - port: 8000
      targetPort: http
      name: http
