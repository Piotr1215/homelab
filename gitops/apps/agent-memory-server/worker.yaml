---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: agent-memory-worker
  namespace: ai-tools
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-memory-worker
      app.kubernetes.io/component: worker
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-memory-worker
  namespace: ai-tools
  labels:
    app.kubernetes.io/name: agent-memory-worker
    app.kubernetes.io/instance: agent-memory-server
    app.kubernetes.io/component: worker
  annotations:
    descheduler.alpha.kubernetes.io/evict: "false"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-memory-worker
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-memory-worker
        app.kubernetes.io/instance: agent-memory-server
        app.kubernetes.io/component: worker
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/instance: agent-memory-server
                topologyKey: kubernetes.io/hostname
      containers:
        - name: worker
          image: piotrzan/agent-memory-server:0.15.1-patched-v5
          command: ["agent-memory", "task-worker"]
          env:
            - name: REDIS_URL
              value: redis://agent-memory-redis.ai-tools.svc:6379
            - name: LONG_TERM_MEMORY
              value: "true"
            - name: ENABLE_TOPIC_EXTRACTION
              value: "true"
            - name: ENABLE_NER
              value: "true"
            - name: GENERATION_MODEL
              value: anthropic/claude-sonnet-4-6
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-api-key
                  key: api-key
            - name: FAST_MODEL
              value: anthropic/claude-sonnet-4-6
            - name: SLOW_MODEL
              value: anthropic/claude-sonnet-4-6
            - name: EMBEDDING_MODEL
              value: ollama/nomic-embed-text
            - name: OLLAMA_API_BASE
              value: http://ollama-pc.ai-tools.svc:11434
            - name: OPENAI_API_KEY
              value: "sk-dummy"
            - name: REDISVL_VECTOR_DIMENSIONS
              value: "768"
            - name: COMPACT_SEMANTIC_DUPLICATES
              value: "true"
            - name: COMPACTION_EVERY_MINUTES
              value: "180"
          # Liveness via redis ping -- catches the redis-service-unreachable case
          # observed during the 2026-05-01 pve1 crash, where the worker's existing
          # connection pool went stale and stayed in TimeoutError loops without
          # exiting. Restart on 2 consecutive failures (~60s detection).
          # Note: a new connection in the probe may succeed when the worker's own
          # pool is hung -- this probe primarily catches redis-side outages, not
          # in-process pool staleness. Tradeoff accepted: simple, no app changes.
          livenessProbe:
            exec:
              command:
                - python3
                - -c
                - |
                  import os, sys, redis
                  sys.exit(0 if redis.from_url(os.environ["REDIS_URL"], socket_timeout=5).ping() else 1)
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 2
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
