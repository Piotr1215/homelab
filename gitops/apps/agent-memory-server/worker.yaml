---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-memory-worker
  namespace: ai-tools
  labels:
    app.kubernetes.io/name: agent-memory-worker
    app.kubernetes.io/instance: agent-memory-server
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-memory-worker
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-memory-worker
        app.kubernetes.io/instance: agent-memory-server
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: piotrzan/agent-memory-server:0.13.2-custom-v5
          command: ["agent-memory", "task-worker"]
          env:
            - name: REDIS_URL
              value: redis://agent-memory-redis.ai-tools.svc:6379
            - name: LONG_TERM_MEMORY
              value: "true"
            - name: ENABLE_TOPIC_EXTRACTION
              value: "true"
            - name: ENABLE_NER
              value: "true"
            - name: GENERATION_MODEL
              value: ollama/llama3.2:3b
            - name: FAST_MODEL
              value: ollama/llama3.2:3b
            - name: SLOW_MODEL
              value: ollama/llama3.2:3b
            - name: EMBEDDING_MODEL
              value: ollama/nomic-embed-text
            - name: OLLAMA_API_BASE
              value: http://ollama-mac.ai-tools.svc:11434
            - name: OPENAI_API_KEY
              value: "sk-dummy"
            - name: REDISVL_VECTOR_DIMENSIONS
              value: "768"
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
