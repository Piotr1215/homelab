---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: agents-mcp
  namespace: ai-tools
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agents-mcp
      app.kubernetes.io/component: mcp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agents-mcp
  namespace: ai-tools
  labels:
    app.kubernetes.io/name: agents-mcp
    app.kubernetes.io/instance: agents-mcp-server
    app.kubernetes.io/component: mcp
  annotations:
    descheduler.alpha.kubernetes.io/evict: "false"
spec:
  # Stateless (post-DuckDB removal). Keep replicas=1 until sticky-session
  # behavior across SSE/streamable-HTTP clients is verified end-to-end via NATS.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agents-mcp
      app.kubernetes.io/component: mcp
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agents-mcp
        app.kubernetes.io/instance: agents-mcp-server
        app.kubernetes.io/component: mcp
    spec:
      containers:
        - name: mcp
          image: piotrzan/agents-mcp-server:5.1.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: AGENTS_NATS_URL
              value: nats://nats.nats.svc:4222
            - name: AGENTS_TRANSPORT
              value: http
            - name: AGENTS_HTTP_PORT
              value: "3000"
            - name: NODE_ENV
              value: production
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: agents-mcp
  namespace: ai-tools
  labels:
    app.kubernetes.io/name: agents-mcp
    app.kubernetes.io/instance: agents-mcp-server
    app.kubernetes.io/component: mcp
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agents-mcp
    app.kubernetes.io/component: mcp
  ports:
    - port: 3000
      targetPort: http
      name: http
