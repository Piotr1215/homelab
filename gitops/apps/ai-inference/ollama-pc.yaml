---
apiVersion: v1
kind: Service
metadata:
  name: ollama-pc
  namespace: ai-tools
  labels:
    app: ollama-pc
    component: inference
  annotations:
    description: "Pop-OS desktop - always on"
spec:
  clusterIP: None
  ports:
  - port: 11434
    targetPort: 11434
    protocol: TCP
    name: http
---
apiVersion: v1
kind: Endpoints
metadata:
  name: ollama-pc
  namespace: ai-tools
subsets:
- addresses:
  - ip: 192.168.178.125
  ports:
  - port: 11434
    name: http
