---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agents-mcp
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
      sectionName: http
  hostnames:
    - "agents-mcp.homelab.local"
  rules:
    - backendRefs:
        - name: agents-mcp
          namespace: ai-tools
          port: 3000
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: agents-mcp-backend
  namespace: ai-tools
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: envoy-gateway-system
  to:
    - group: ""
      kind: Service
      name: agents-mcp
