apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: memory-workbench
spec:
  parentRefs:
  - name: homelab-gateway
    namespace: envoy-gateway-system
    sectionName: https
  hostnames:
  - "memory-workbench.homelab.local"
  rules:
  - backendRefs:
    - name: agent-memory-workbench
      namespace: ai-tools
      port: 8080
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: memory-workbench-backend
  namespace: ai-tools
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: envoy-gateway-system
  to:
  - group: ""
    kind: Service
    name: agent-memory-workbench
