---
# Tornjak admin UI for SPIRE. Exposes privileged CA-issuance surface —
# anyone who reaches this URL can issue arbitrary SPIFFE IDs in the
# trust domain. Today: tailnet-reachable via homelab-gateway, same as
# other *.homelab.local services. Phase-3 follow-up: put Hydra OIDC
# auth in front before loft.rocks rollout.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tornjak
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - "tornjak.homelab.local"
  rules:
    # /api/* → Tornjak backend (sidecar on spire-server pod). UI calls this
    # from the browser to fetch entries/agents — apiServerURL in
    # tornjak-frontend values must match.
    - matches:
        - path:
            type: PathPrefix
            value: /api
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: spire-tornjak-backend
          namespace: spire-server
          port: 10000
    # catch-all → Tornjak frontend (React UI).
    - backendRefs:
        - name: spire-tornjak-frontend
          namespace: spire-server
          port: 3000
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: tornjak-backend
  namespace: spire-server
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: envoy-gateway-system
  to:
    - group: ""
      kind: Service
      name: spire-tornjak-frontend
    - group: ""
      kind: Service
      name: spire-tornjak-backend
