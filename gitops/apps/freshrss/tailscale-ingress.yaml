apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: freshrss-tailscale
  namespace: freshrss
spec:
  ingressClassName: tailscale
  tls:
    - hosts:
        - freshrss
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: freshrss
                port:
                  number: 80
