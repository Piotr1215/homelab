---
apiVersion: v1
kind: Namespace
metadata:
  name: kube-cleanup-operator
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-cleanup-operator
  namespace: kube-cleanup-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-cleanup-operator
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "delete"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "delete"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-cleanup-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-cleanup-operator
subjects:
- kind: ServiceAccount
  name: kube-cleanup-operator
  namespace: kube-cleanup-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-cleanup-operator
  namespace: kube-cleanup-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-cleanup-operator
  template:
    metadata:
      labels:
        app: kube-cleanup-operator
    spec:
      serviceAccountName: kube-cleanup-operator
      containers:
      - name: kube-cleanup-operator
        image: quay.io/lwolf/kube-cleanup-operator:0.8.4
        # IMPORTANT: kube-cleanup-operator is configured by command-line FLAGS, not
        # env vars. It reads flags only, so an env-var block is inert. Previously this
        # deployment set env (DELETE_SUCCESSFUL_AFTER, IGNORE_OWNED_BY_CRONJOB, ...),
        # which the binary ignored, so it ran on defaults: -legacy-mode=true with
        # -keep-successful=0 deletes successful jobs immediately. For CronJob children
        # that raced the CronJob controller's status.lastSuccessfulTime update, which
        # stalled kube_cronjob_status_last_successful_time and false-fired
        # R2RMemorySyncStale even though r2r-memory-sync succeeds hourly.
        args:
        # Use modern delete-*-after semantics; legacy keep-* mode deletes immediately.
        - -legacy-mode=false
        # Do not touch Jobs/Pods owned by CronJobs. Their own history limits
        # (successfulJobsHistoryLimit/failedJobsHistoryLimit) reap them, so children
        # live long enough for the controller to record lastSuccessfulTime.
        - -ignore-owned-by-cronjobs
        # Cleanup delays for standalone (non-CronJob) jobs/pods.
        - -delete-successful-after=1h
        - -delete-failed-after=24h
        - -delete-pending-pods-after=24h
        - -delete-orphaned-pods-after=1h
        resources:
          limits:
            cpu: 50m
            memory: 50Mi
          requests:
            cpu: 10m
            memory: 20Mi