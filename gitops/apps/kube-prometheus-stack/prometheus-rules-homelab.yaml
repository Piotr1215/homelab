apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: homelab-alerts
  namespace: prometheus
  labels:
    prometheus: kube-prometheus
    role: alert-rules
    # Prometheus operator ruleSelector matches release=kube-prometheus-stack;
    # without this label none of these homelab rules are loaded.
    release: kube-prometheus-stack
spec:
  groups:
    # Pod and Container Alerts
    - name: pod.rules
      interval: 30s
      rules:
        - alert: PodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total[1h]) > 5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted {{ $value | humanize }} times in the last hour."

        - alert: PodNotReady
          expr: sum by (namespace, pod) (kube_pod_status_phase{phase=~"Pending|Unknown|Failed"}) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in {{ $labels.phase }} state for more than 10 minutes."

        - alert: ContainerMemoryUsageHigh
          # container!="" drops the pause/sandbox and pod-level rollup series;
          # the "> 0" guard on the denominator drops containers that declare no
          # memory limit. Without both, limit=0 makes the division return +Inf,
          # which always satisfies "> 0.9" and fires for every pod in the cluster.
          expr: (container_memory_working_set_bytes{container!=""} / (container_spec_memory_limit_bytes{container!=""} > 0)) > 0.9
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Container {{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }} memory usage high"
            description: "Container is using {{ $value | humanizePercentage }} of memory limit."

    # Agent Memory Server (critical infrastructure)
    - name: agent-memory.rules
      interval: 30s
      rules:
        - alert: AgentMemoryPodRestarted
          expr: increase(kube_pod_container_status_restarts_total{namespace="ai-tools", pod=~"agent-memory-.*"}[30m]) > 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "agent-memory pod {{ $labels.pod }} restarted"
            description: "Pod {{ $labels.pod }} (container {{ $labels.container }}) restarted {{ $value | humanize }} times in the last 30 minutes."

    # RAG Pipeline Sync
    - name: rag-sync.rules
      interval: 5m
      rules:
        - alert: R2RMemorySyncStale
          expr: time() - kube_cronjob_status_last_successful_time{cronjob="r2r-memory-sync", namespace="ai-tools"} > 3 * 3600
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "R2R memory sync hasn't succeeded in 3+ hours"
            description: "CronJob r2r-memory-sync last succeeded {{ $value | humanizeDuration }} ago. New agent memories won't appear in RAG search."

    # Node Alerts
    - name: node.rules
      interval: 30s
      rules:
        - alert: NodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} is not ready"
            description: "Node {{ $labels.node }} has been unready for more than 5 minutes."

        - alert: NodeMemoryPressure
          expr: kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.node }} has memory pressure"
            description: "Node {{ $labels.node }} is experiencing memory pressure."

        - alert: NodeDiskPressure
          expr: kube_node_status_condition{condition="DiskPressure",status="true"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.node }} has disk pressure"
            description: "Node {{ $labels.node }} is experiencing disk pressure."

        - alert: NodeDiskSpaceLow
          expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} disk space low"
            description: "Node {{ $labels.instance }} has less than 10% disk space available on {{ $labels.mountpoint }}."

        - alert: NodeDiskSpaceCritical
          expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.instance }} disk space critical"
            description: "Node {{ $labels.instance }} has less than 5% disk space available on {{ $labels.mountpoint }}."

    # Storage Alerts
    - name: storage.rules
      interval: 30s
      rules:
        - alert: PersistentVolumeSpaceLow
          expr: (kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes) < 0.2
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "PV {{ $labels.persistentvolumeclaim }} space low"
            description: "Persistent volume {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} has less than 20% space available."

        - alert: PersistentVolumeSpaceCritical
          expr: (kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes) < 0.1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "PV {{ $labels.persistentvolumeclaim }} space critical"
            description: "Persistent volume {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} has less than 10% space available."

    # Certificate Alerts
    - name: certificate.rules
      interval: 1h
      rules:
        - alert: CertificateExpiringSoon
          expr: certmanager_certificate_expiration_timestamp_seconds - time() < 7 * 24 * 3600
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Certificate {{ $labels.namespace }}/{{ $labels.name }} expiring soon"
            description: "Certificate {{ $labels.namespace }}/{{ $labels.name }} will expire in {{ $value | humanizeDuration }}."

        - alert: CertificateExpiryCritical
          expr: certmanager_certificate_expiration_timestamp_seconds - time() < 24 * 3600
          for: 1h
          labels:
            severity: critical
          annotations:
            summary: "Certificate {{ $labels.namespace }}/{{ $labels.name }} expiring within 24h"
            description: "Certificate {{ $labels.namespace }}/{{ $labels.name }} will expire in {{ $value | humanizeDuration }}."

        - alert: CertificateNotReady
          expr: certmanager_certificate_ready_status{condition="False"} == 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Certificate {{ $labels.namespace }}/{{ $labels.name }} not ready"
            description: "Certificate {{ $labels.namespace }}/{{ $labels.name }} is not ready."

    # Backup Alerts
    - name: backup.rules
      interval: 1h
      rules:
        - alert: VeleroBackupFailed
          expr: increase(velero_backup_failure_total[24h]) > 0
          labels:
            severity: critical
          annotations:
            summary: "Velero backup failed"
            description: "Velero backup has failed {{ $value }} times in the last 24 hours."

        - alert: VeleroBackupPartialFailure
          expr: increase(velero_backup_partial_failure_total[24h]) > 0
          labels:
            severity: warning
          annotations:
            summary: "Velero backup partially failed"
            description: "Velero backup has partially failed {{ $value }} times in the last 24 hours."

        - alert: NoBackupInLast24Hours
          expr: time() - velero_backup_last_successful_timestamp{schedule!=""} > 24 * 3600
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "No successful backup for schedule {{ $labels.schedule }}"
            description: "No successful Velero backup has been created for schedule {{ $labels.schedule }} in the last 24 hours."

        - alert: LonghornBackupFailed
          expr: longhorn_backup_state == 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn backup failed for {{ $labels.volume }}"
            description: "Longhorn backup {{ $labels.backup }} for volume {{ $labels.volume }} is in error state."

        - alert: LonghornVolumeDegraded
          # robustness codes: 0=unknown(detached) 1=healthy 2=degraded 3=faulted.
          # Fire only on genuine degradation (2). Matching 0 caught every detached
          # or orphaned volume (idle PVCs, leftover per-replica claims) and woke the
          # self-heal loop for volumes with nothing wrong. See ops/self-heal/incidents/
          # 2026-07-19-longhornvolumedegraded-spire.md.
          expr: longhorn_volume_robustness == 2
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn volume {{ $labels.pvc }} is degraded"
            description: "Longhorn volume {{ $labels.volume }} in namespace {{ $labels.pvc_namespace }} has degraded robustness (replica loss while attached)."

    # ArgoCD Alerts
    - name: argocd.rules
      interval: 30s
      rules:
        - alert: ArgoApplicationOutOfSync
          expr: argocd_app_info{sync_status="OutOfSync"} == 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "ArgoCD application {{ $labels.name }} out of sync"
            description: "ArgoCD application {{ $labels.namespace }}/{{ $labels.name }} has been out of sync for more than 15 minutes."

        - alert: ArgoApplicationHealthDegraded
          expr: argocd_app_info{health_status=~"Degraded|Suspended"} == 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "ArgoCD application {{ $labels.name }} health degraded"
            description: "ArgoCD application {{ $labels.namespace }}/{{ $labels.name }} health is {{ $labels.health_status }}."

        - alert: ArgoApplicationSyncFailed
          expr: argocd_app_info{sync_status="Unknown"} == 1
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "ArgoCD application {{ $labels.name }} sync failed"
            description: "ArgoCD application {{ $labels.namespace }}/{{ $labels.name }} sync status is Unknown."

    # Vault Alerts
    - name: vault.rules
      interval: 30s
      rules:
        - alert: VaultSealed
          expr: vault_core_unsealed == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Vault is sealed"
            description: "Vault instance is sealed and requires manual intervention."

        - alert: VaultHighMemoryUsage
          expr: (container_memory_working_set_bytes{namespace="vault",container="vault"} / container_spec_memory_limit_bytes{namespace="vault",container="vault"}) > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Vault memory usage high"
            description: "Vault is using {{ $value | humanizePercentage }} of its memory limit."

    # General Service Availability
    - name: service.rules
      interval: 30s
      rules:
        - alert: ServiceDown
          # kube-proxy exposes metrics on 127.0.0.1 so it is never scrapable
          # here; excluding it avoids a permanent false positive (TargetDown
          # already covers genuinely unreachable targets).
          expr: up{job!="kube-proxy"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Service {{ $labels.job }} is down"
            description: "Service {{ $labels.job }} on {{ $labels.instance }} has been down for more than 5 minutes."

        - alert: HighErrorRate
          expr: rate(prometheus_http_requests_total{code=~"5.."}[5m]) > 0.1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High error rate on {{ $labels.job }}"
            description: "{{ $labels.job }} is experiencing high error rate: {{ $value }} errors/sec."

    # Cluster Resource Alerts
    - name: cluster.rules
      interval: 30s
      rules:
        - alert: TooManyPods
          # 7-node cluster steady-state runs ~150 pods; 100 fired constantly.
          # 300 flags a genuine runaway (default kubelet cap is 110 pods/node).
          expr: sum(kubelet_running_pods) > 300
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Too many pods running"
            description: "Cluster has {{ $value }} pods running, which may indicate resource issues."

        - alert: KubernetesJobFailed
          # Only alert on jobs that failed in the last 24h. Without the recency
          # guard, kube-state-metrics keeps re-exposing long-dead failed jobs
          # (e.g. a 90-day-old spire pre-upgrade hook) so the alert never clears.
          expr: kube_job_status_failed > 0 and (time() - kube_job_created) < 86400
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Kubernetes job {{ $labels.namespace }}/{{ $labels.job_name }} failed"
            description: "Kubernetes job {{ $labels.namespace }}/{{ $labels.job_name }} has failed."

    # R2R Vector Store stats exporter (r2r-stats)
    - name: r2r-stats.rules
      interval: 1m
      rules:
        - alert: R2RStatsDown
          expr: up{service="r2r-stats", namespace="ai-tools"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "r2r-stats exporter is down"
            description: "Prometheus cannot scrape r2r-stats in ai-tools; the vector-store dashboard has no data."

        - alert: R2RScanFailing
          expr: r2r_stats_up == 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "r2r-stats cannot reach the R2R API"
            description: "r2r-stats has failed to scan R2R for 15m ({{ $value }}). Check the R2R API in ai-tools."

        - alert: R2RScanStale
          expr: time() - r2r_stats_last_success_timestamp_seconds > 1800
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "r2r-stats has no fresh scan"
            description: "Last successful R2R scan was {{ $value | humanizeDuration }} ago (threshold 30m)."

        - alert: R2RStoreShrank
          expr: delta(r2r_documents_total[1h]) < -100
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "R2R store lost documents"
            description: "r2r_documents_total dropped by {{ $value }} in the last hour, which may signal an accidental purge."

    # R2R repo-vector sync health (serval-side exporter r2r-repo-health).
    # Metrics are pushed from serval (local ingester) into the in-cluster
    # r2r-repo-health receiver and scraped from there. These catch the
    # cloudrumble failure class: cache-vs-live drift, under-ingest, zero-file,
    # and failed sync runs. Alerts labelled remediation=reingest are
    # auto-healable by re-running the forced ingest for that repo.
    - name: r2r-repo-vector.rules
      interval: 5m
      rules:
        # SLI: ingest completeness = docs live in R2R / docs the ingester
        # expects to write, per repo+source, only where expected > 0.
        - record: r2r_repo_ingest_completeness_ratio
          expr: r2r_repo_live_documents / (r2r_repo_expected_documents > 0)

        - alert: R2RRepoCacheDrift
          expr: abs(r2r_repo_drift_documents) > 0 and on() (r2r_repo_health_scan_complete == 1)
          for: 30m
          labels:
            severity: warning
            remediation: reingest
          annotations:
            summary: "R2R repo {{ $labels.repo }} cache/live drift ({{ $labels.source }})"
            description: "Repo {{ $labels.repo }} {{ $labels.source }} cache-vs-live drift is {{ $value }} (nonzero = the local hash cache disagrees with what R2R actually stores; retrieval may be stale or incomplete)."
            runbook: "On serval: __r2r_repo_manage.py resync {{ $labels.repo }} --force"

        - alert: R2RRepoUnderIngested
          expr: (r2r_repo_ingest_completeness_ratio < 0.99) and on() (r2r_repo_health_scan_complete == 1)
          for: 30m
          labels:
            severity: warning
            remediation: reingest
          annotations:
            summary: "R2R repo {{ $labels.repo }} under-ingested ({{ $labels.source }})"
            description: "Repo {{ $labels.repo }} {{ $labels.source }} ingest completeness is {{ $value | humanizePercentage }} (live docs in R2R are fewer than the ingester expects). Partial or failed ingest; retrieval will miss content."
            runbook: "On serval: __r2r_repo_manage.py resync {{ $labels.repo }} --force"

        - alert: R2RRepoZeroFiles
          expr: (r2r_repo_live_documents{source="file"} == 0 and r2r_repo_expected_documents{source="file"} > 0) and on() (r2r_repo_health_scan_complete == 1)
          for: 30m
          labels:
            severity: warning
            remediation: reingest
          annotations:
            summary: "R2R repo {{ $labels.repo }} has zero file docs"
            description: "Repo {{ $labels.repo }} has 0 file documents in R2R but the ingester expects a file corpus. File ingest failed (the cloudrumble failure signature)."
            runbook: "On serval: __r2r_repo_manage.py resync {{ $labels.repo }} --force"

        # Real failure: the run reported failed items. Actionable, pages at warning.
        - alert: R2RRepoIngestFailed
          expr: r2r_repo_last_run_failed > 0
          for: 5m
          labels:
            severity: warning
            remediation: reingest
          annotations:
            summary: "R2R repo {{ $labels.repo }} sync reported failed items"
            description: "The last sync run for repo {{ $labels.repo }} finished with {{ $value }} failed item(s) (from -progress.json). cloudrumble's crashed run is the reference case."
            runbook: "On serval: check ~/.local/state/r2r-repo-sync.log, then __r2r_repo_manage.py resync {{ $labels.repo }} --force"

        # Benign: the run did not finish cleanly (deferred/skipped/store-busy or a
        # crashed progress file) but reported ZERO failed items. Actual data loss is
        # caught separately by R2RRepoUnderIngested / R2RRepoZeroFiles at warning.
        # Info only: recorded, not paged; a resync no-ops or backfills and clears it.
        - alert: R2RRepoSyncIncomplete
          expr: r2r_repo_last_run_ok == 0 and r2r_repo_last_run_failed == 0
          for: 15m
          labels:
            severity: info
            remediation: reingest
          annotations:
            summary: "R2R repo {{ $labels.repo }} last sync did not complete cleanly (no failures)"
            description: "Repo {{ $labels.repo }} last run ended non-ok with 0 failed items (deferred/skipped/store-busy or a crashed progress file). Benign unless the repo is also under-ingested; a resync no-ops or backfills and clears it."
            runbook: "On serval (low priority): __r2r_repo_manage.py resync {{ $labels.repo }} --force"

        # Threshold is 14h, not 1h: serval is a workstation, not a 24/7 host. It
        # is powered off every night (measured off-windows 8h36m to 11h over two
        # weeks), so a 1h threshold fired every single morning on a healthy push.
        # While serval is off no ingest runs and nothing can drift, so a blind
        # window there is harmless; the failure worth paging on is a dead push
        # while serval is actually up, and 14h clears the longest normal
        # off-window with headroom while still catching a stuck push same-day.
        - alert: R2RRepoHealthStale
          expr: time() - r2r_repo_health_received_timestamp_seconds > 50400
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "R2R repo-health metrics are stale"
            description: "The receiver has accepted no fresh health push for {{ $value | humanizeDuration }} (threshold 14h, sized above serval's nightly power-off). The serval health push (5-min user timer + OnBootSec + post-resync) is down for longer than an overnight gap; drift detection is blind until it resumes. Uses the receiver clock, so it is skew-free and fires after a receiver restart with no push."

        - alert: R2RRepoHealthExporterDown
          expr: up{service="r2r-repo-health", namespace="ai-tools"} == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "r2r-repo-health exporter is down"
            description: "Prometheus cannot scrape r2r-repo-health in ai-tools; all repo-vector drift and failure alerts are blind."

        - alert: R2RApiUnreachableFromSync
          expr: r2r_repo_health_up == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "R2R API unreachable from serval sync"
            description: "serval's health command could not reach the R2R API over the tailnet; new ingests and resyncs will fail until it recovers."
