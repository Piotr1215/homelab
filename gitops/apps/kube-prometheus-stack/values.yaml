namespaceOverride: prometheus

# Cardinality trim (see prometheusSpec.retention below).
#
# Long retention is only affordable if we stop paying for series nobody reads.
# Every metric dropped here was verified unreferenced against BOTH the live
# alerting/recording rules (/api/v1/rules) and all 34 Grafana dashboards before
# removal, so nothing on screen or paging goes blank.
#
# Only _bucket series are dropped from histograms; the _sum and _count series
# stay, so averages still work, we only lose per-quantile breakdowns.
#
# Deliberately KEPT despite being large:
#   apiserver_request_sli_duration_seconds_bucket - 23 SLO burn-rate rules
#   kubelet_runtime_operations_duration_seconds_bucket - kubelet dashboard
#   storage_operation_duration_seconds_bucket - kubelet dashboard
#   workqueue_queue_duration_seconds_bucket - 3 dashboards (its _work_ sibling is unused)
# To restore any dropped metric, delete it from the regex; it repopulates on the
# next scrape (historical gap remains).

kubeEtcd:
  enabled: false

kubeApiServer:
  serviceMonitor:
    metricRelabelings:
      # apiserver_request_duration_seconds is the classic latency histogram, but
      # the availability SLO rules moved to the _sli_ variant (kept above), so
      # this one is now pure cost. etcd_* rides the apiserver job since
      # kubeEtcd is disabled and we have no etcd dashboard.
      - sourceLabels: [__name__]
        regex: "apiserver_request_duration_seconds_bucket|apiserver_watch_list_duration_seconds_bucket|apiserver_request_body_size_bytes_bucket|apiserver_watch_cache_read_wait_seconds_bucket|apiserver_response_sizes_bucket|apiserver_watch_events_sizes_bucket|etcd_request_duration_seconds_bucket|workqueue_work_duration_seconds_bucket|kubernetes_feature_enabled"
        action: drop

kubelet:
  serviceMonitor:
    metricRelabelings:
      - sourceLabels: [__name__]
        regex: "prober_probe_duration_seconds_bucket|workqueue_work_duration_seconds_bucket|kubernetes_feature_enabled"
        action: drop
    # cAdvisor is a separate endpoint on the same job and needs its own list.
    cAdvisorMetricRelabelings:
      - sourceLabels: [__name__]
        regex: "container_memory_failures_total|container_blkio_device_usage_total"
        action: drop
    # The kubelet exposes /metrics and /metrics/probes behind one port name, so
    # the endpoint label cannot tell us which one serves prober_probe_duration.
    # Repeating the drop here is a no-op if it is not on this endpoint, and
    # guarantees the ~4.4k series go either way.
    probesMetricRelabelings:
      - sourceLabels: [__name__]
        regex: "prober_probe_duration_seconds_bucket"
        action: drop

kubeControllerManager:
  serviceMonitor:
    metricRelabelings:
      - sourceLabels: [__name__]
        regex: "workqueue_work_duration_seconds_bucket|kubernetes_feature_enabled"
        action: drop

kubeScheduler:
  serviceMonitor:
    metricRelabelings:
      - sourceLabels: [__name__]
        regex: "scheduler_plugin_execution_duration_seconds_bucket|workqueue_work_duration_seconds_bucket|kubernetes_feature_enabled"
        action: drop

kubeProxy:
  serviceMonitor:
    metricRelabelings:
      - sourceLabels: [__name__]
        regex: "kubernetes_feature_enabled"
        action: drop

kube-state-metrics:
  namespaceOverride: prometheus
  prometheus:
    monitor:
      metricRelabelings:
        # Pure pod metadata, one series per toleration. Never queried.
        - sourceLabels: [__name__]
          regex: "kube_pod_tolerations"
          action: drop

prometheus-node-exporter:
  namespaceOverride: prometheus
  prometheus:
    monitor:
      metricRelabelings:
        # Per-IPVS-backend gauges, ~6.6k series. Cilium handles our dataplane.
        - sourceLabels: [__name__]
          regex: "node_ipvs_backend_.*"
          action: drop

prometheus:
  service:
    type: LoadBalancer
    annotations:
      metallb.universe.tf/loadBalancerIPs: "192.168.178.90"
  prometheusSpec:
    enableRemoteWriteReceiver: true
    # 10d was losing history right when it got interesting (a 30d dashboard
    # showed a cliff at day 10). The cardinality trim above removes a measured
    # 97k of 228k active series (42.6%), dropping growth from 1.02 to
    # ~0.59 GB/day, so 9x the window costs only ~53GB.
    #
    # retentionSize is a guard rail, not the target: whichever limit hits first
    # wins, so if the trim underperforms Prometheus expires old blocks instead
    # of filling the node disk. It is set above the 53GB projection on purpose,
    # so 90d stays the binding limit; at 50GB the cap would have silently
    # capped us at ~85d instead. kube-worker3 has ~105GB free and the PVC is
    # local-path (hostPath, no quota enforced), so nothing else bounds growth.
    retention: 90d
    retentionSize: 60GB
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          resources:
            requests:
              storage: 10Gi
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi

grafana:
  namespaceOverride: prometheus
  defaultDashboardsEnabled: true
  admin:
    existingSecret: grafana-admin-token
    userKey: admin-user
    passwordKey: admin-password
  initChownData:
    enabled: false
  service:
    type: LoadBalancer
    annotations:
      metallb.universe.tf/loadBalancerIPs: "192.168.178.96"
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: local-path
  securityContext:
    fsGroup: 472
    runAsUser: 472
    runAsNonRoot: true
  env:
    GF_INSTALL_PLUGINS: grafana-pyroscope-datasource,grafana-llm-app
  additionalDataSources:
    - name: Pyroscope
      type: grafana-pyroscope-datasource
      access: proxy
      url: http://pyroscope.pyroscope.svc.cluster.local:4040
      editable: true
      isDefault: false
      jsonData:
        minStep: '15s'
  sidecar:
    datasources:
      enabled: true
  grafana.ini:
    auth.anonymous:
      enabled: true
      org_role: Admin

alertmanager:
  enabled: true
  service:
    type: LoadBalancer
    annotations:
      metallb.universe.tf/loadBalancerIPs: "192.168.178.91"
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          resources:
            requests:
              storage: 1Gi
    secrets:
      - ntfy-webhook-url
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'default'
      routes:
        # Critical alerts - send immediately
        - matchers:
            - severity = critical
          receiver: ntfy-critical
          group_wait: 0s
          repeat_interval: 4h
          continue: true
        # Warning alerts
        - matchers:
            - severity = warning
          receiver: ntfy-warning
          group_wait: 30s
          repeat_interval: 12h
        # Storage alerts
        - matchers:
            - alertname =~ "PersistentVolume.*|.*DiskPressure"
          receiver: ntfy-storage
          repeat_interval: 12h
        # Backup alerts
        - matchers:
            - alertname =~ "VeleroBackup.*|VaultSnapshot.*"
          receiver: ntfy-backup
          repeat_interval: 12h
        # VCluster MCP alerts - only fires on actual tool calls
        - matchers:
            - alertname = VClusterMCPToolUsed
          receiver: ntfy-vcluster-mcp
          group_by: ['tool_name']
          group_wait: 5s
          repeat_interval: 5m
        # Info alerts - record in Prometheus/Alertmanager, never page.
        # Without this, info falls through to the root 'default' receiver, which
        # posts to the ntfy bridge and would ping the phone like a warning.
        - matchers:
            - severity = info
          receiver: "null"
        # Noise alerts - silence
        - matchers:
            - alertname =~ "Watchdog|InfoInhibitor"
          receiver: "null"
    receivers:
      - name: 'null'
      - name: 'default'
        webhook_configs:
          - url: 'http://ntfy-alertmanager.ntfy-alertmanager.svc.cluster.local:8080'
            send_resolved: true
            http_config:
              basic_auth:
                username: alertmanager
                password: changeme
      - name: 'ntfy-critical'
        webhook_configs:
          - url: 'http://ntfy-alertmanager.ntfy-alertmanager.svc.cluster.local:8080'
            send_resolved: true
            http_config:
              basic_auth:
                username: alertmanager
                password: changeme
      - name: 'ntfy-warning'
        webhook_configs:
          - url: 'http://ntfy-alertmanager.ntfy-alertmanager.svc.cluster.local:8080'
            send_resolved: true
            http_config:
              basic_auth:
                username: alertmanager
                password: changeme
      - name: 'ntfy-storage'
        webhook_configs:
          - url: 'http://ntfy-alertmanager.ntfy-alertmanager.svc.cluster.local:8080'
            send_resolved: true
            http_config:
              basic_auth:
                username: alertmanager
                password: changeme
      - name: 'ntfy-backup'
        webhook_configs:
          - url: 'http://ntfy-alertmanager.ntfy-alertmanager.svc.cluster.local:8080'
            send_resolved: true
            http_config:
              basic_auth:
                username: alertmanager
                password: changeme
      - name: 'ntfy-vcluster-mcp'
        webhook_configs:
          - url_file: /etc/alertmanager/secrets/ntfy-webhook-url/url
            send_resolved: true
    inhibit_rules:
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity = warning
        equal: ['alertname', 'namespace', 'pod']
    templates:
      - /etc/alertmanager/config/*.tmpl
