apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-logs-dashboard
  namespace: prometheus
  labels:
    grafana_dashboard: "1"
    app: kube-prometheus-stack-grafana
data:
  loki-logs-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "id": 1,
          "title": "Log Volume by Level",
          "type": "timeseries",
          "gridPos": {
            "h": 8,
            "w": 16,
            "x": 0,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "drawStyle": "bars",
                "fillOpacity": 60,
                "lineWidth": 1,
                "showPoints": "never",
                "stacking": {
                  "mode": "normal",
                  "group": "A"
                },
                "axisPlacement": "auto",
                "axisColorMode": "text",
                "scaleDistribution": {
                  "type": "linear"
                },
                "hideFrom": {
                  "tooltip": false,
                  "viz": false,
                  "legend": false
                }
              },
              "unit": "short",
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true,
              "calcs": []
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "expr": "sum by (detected_level) (count_over_time({namespace=~\"$namespace\", pod=~\"$pod\"} |~ `(?i)$search` [$__auto]))",
              "refId": "A",
              "queryType": "range",
              "editorMode": "code",
              "legendFormat": "{{detected_level}}"
            }
          ]
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "id": 2,
          "title": "Error / Warn Lines (range)",
          "type": "stat",
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 16,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 100
                  }
                ]
              },
              "unit": "short",
              "noValue": "0",
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "expr": "sum(count_over_time({namespace=~\"$namespace\", pod=~\"$pod\"} |~ `(?i)(error|warn|fail|panic|fatal|exception)` [$__range]))",
              "refId": "A",
              "queryType": "instant",
              "editorMode": "code"
            }
          ]
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "id": 3,
          "title": "Top Pods by Log Volume",
          "type": "table",
          "gridPos": {
            "h": 12,
            "w": 8,
            "x": 0,
            "y": 8
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "filterable": true
              },
              "unit": "short",
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "Lines",
                "desc": true
              }
            ]
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "expr": "topk(20, sum by (namespace, pod) (count_over_time({namespace=~\"$namespace\", pod=~\"$pod\"} [$__range])))",
              "refId": "A",
              "queryType": "instant",
              "editorMode": "code"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true
                },
                "indexByName": {
                  "namespace": 0,
                  "pod": 1,
                  "Value #A": 2
                },
                "renameByName": {
                  "Value #A": "Lines",
                  "Value": "Lines"
                }
              }
            },
            {
              "id": "sortBy",
              "options": {
                "fields": {},
                "sort": [
                  {
                    "field": "Lines",
                    "desc": true
                  }
                ]
              }
            }
          ]
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "id": 4,
          "title": "Logs",
          "type": "logs",
          "gridPos": {
            "h": 12,
            "w": 16,
            "x": 8,
            "y": 8
          },
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "dedupStrategy": "none",
            "sortOrder": "Descending"
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "expr": "{namespace=~\"$namespace\", pod=~\"$pod\"} |~ `(?i)$search`",
              "refId": "A",
              "queryType": "range",
              "editorMode": "code",
              "maxLines": 200
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "logs",
        "loki"
      ],
      "templating": {
        "list": [
          {
            "name": "namespace",
            "label": "Namespace",
            "type": "query",
            "datasource": {
              "type": "loki",
              "uid": "loki"
            },
            "query": "label_values(namespace)",
            "refresh": 2,
            "includeAll": true,
            "allValue": ".+",
            "multi": true,
            "sort": 1,
            "current": {
              "selected": true,
              "text": [
                "All"
              ],
              "value": [
                "$__all"
              ]
            },
            "options": []
          },
          {
            "name": "pod",
            "label": "Pod",
            "type": "query",
            "datasource": {
              "type": "loki",
              "uid": "loki"
            },
            "query": "label_values({namespace=~\"$namespace\"}, pod)",
            "refresh": 2,
            "includeAll": true,
            "allValue": ".+",
            "multi": true,
            "sort": 1,
            "current": {
              "selected": true,
              "text": [
                "All"
              ],
              "value": [
                "$__all"
              ]
            },
            "options": []
          },
          {
            "name": "search",
            "label": "Search (regex)",
            "type": "textbox",
            "query": "",
            "current": {
              "selected": false,
              "text": "",
              "value": ""
            },
            "options": [
              {
                "text": "",
                "value": "",
                "selected": false
              }
            ]
          }
        ]
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Loki Logs Explorer",
      "uid": "loki-logs-explorer",
      "version": 1,
      "weekStart": ""
    }
