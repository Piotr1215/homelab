apiVersion: v1
kind: Service
metadata:
  name: nats-tailscale
  namespace: nats
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app.kubernetes.io/component: nats
    app.kubernetes.io/instance: nats
    app.kubernetes.io/name: nats
  ports:
    - name: nats
      port: 4222
      targetPort: nats
      protocol: TCP
