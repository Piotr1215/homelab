# PROJECT: claude-automation
#
# Phase-2 stage 2a (non-breaking): mount the SPIFFE Workload API socket so
# the NATS pod can fetch its SVID (spiffe://agents.loft.internal/ns/nats/
# workload/nats-server — see gitops/apps/spire/clusterspiffeid-nats.yaml).
# NATS server does NOT yet consume the SVID for TLS — that's stage 2c and
# explicitly human-gated because verify_and_map=true breaks every existing
# non-SVID client. Stage 2b publishes the trust bundle; stage 2d wires
# agents-mcp-server to the socket.
#
# Refs: Piotr1215/claude#126 phase 2.
# JSON-patch append instead of merge — chart's strategic-merge on
# container.volumeMounts replaces the list and drops the default
# config + pid mounts required by the nats and reloader containers.
# patch: [] gives explicit "/-" append semantics that preserve defaults.
podTemplate:
  patch:
    - op: add
      path: /spec/volumes/-
      value:
        name: spiffe-workload-api
        csi:
          driver: csi.spiffe.io
          readOnly: true

container:
  patch:
    - op: add
      path: /volumeMounts/-
      value:
        name: spiffe-workload-api
        mountPath: /spiffe-workload-api
        readOnly: true
  env:
    SPIFFE_ENDPOINT_SOCKET: unix:///spiffe-workload-api/spire-agent.sock

config:
  jetstream:
    enabled: true
    memoryStore:
      enabled: true
      maxSize: 256Mi
    fileStore:
      enabled: true
      pvc:
        enabled: true
        size: 1Gi
        storageClassName: longhorn

container:
  resources:
    requests:
      cpu: 10m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 512Mi

service:
  merge:
    spec:
      type: LoadBalancer
      loadBalancerIP: 192.168.178.93

promExporter:
  enabled: true
  podMonitor:
    enabled: true
    merge:
      metadata:
        labels:
          release: kube-prometheus-stack
