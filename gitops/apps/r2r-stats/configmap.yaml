---
# r2r-stats: tiny stdlib HTTP service that serves cached R2R repo-vector-map
# counts for the Homepage customapi widget. Inline-Python on python-slim (no
# custom image), same pattern as the neighboring r2r cronjob. Counting logic
# mirrors ~/.claude/scripts/__r2r_repo_manage.py: page /documents, filter by
# metadata.source in {repo-commit, repo-file}, group by metadata.repo.
apiVersion: v1
kind: ConfigMap
metadata:
  name: r2r-stats-script
  namespace: ai-tools
  labels:
    app.kubernetes.io/name: r2r-stats
data:
  server.py: |
    import json
    import os
    import ssl
    import threading
    import time
    import urllib.error
    import urllib.request
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    R2R_URL = os.environ.get("R2R_URL", "http://r2r-api.ai-tools.svc:7272/v3").rstrip("/")
    CACHE_TTL = int(os.environ.get("CACHE_TTL_SECONDS", "300"))
    PAGE = int(os.environ.get("PAGE_SIZE", "500"))
    PORT = int(os.environ.get("PORT", "8080"))
    REPO_SOURCES = {"repo-commit", "repo-file"}

    # R2R over the in-cluster service is plain HTTP; this ctx only matters if
    # R2R_URL is pointed at the self-signed https tailnet endpoint.
    _ssl_ctx = ssl.create_default_context()
    _ssl_ctx.check_hostname = False
    _ssl_ctx.verify_mode = ssl.CERT_NONE

    _lock = threading.Lock()
    _cache = {
        "repos": 0,
        "total_docs": 0,
        "commit_docs": 0,
        "file_docs": 0,
        "per_repo": {},
        "updated": 0,
        "ok": False,
        "error": None,
        "duration": 0.0,
        "errors_total": 0,
    }

    def r2r_get(path):
        req = urllib.request.Request(R2R_URL + path, headers={"Accept": "application/json"})
        with urllib.request.urlopen(req, timeout=30, context=_ssl_ctx) as resp:
            return json.loads(resp.read().decode())

    def iter_documents():
        """Yield every document across all pages of GET /documents."""
        offset = 0
        while True:
            page = r2r_get("/documents?limit=%d&offset=%d" % (PAGE, offset))
            results = page.get("results", []) or []
            total = page.get("total_entries", 0) or 0
            for doc in results:
                yield doc
            offset += len(results)
            if not results or offset >= total:
                break

    def compute():
        per_repo = {}
        for doc in iter_documents():
            meta = doc.get("metadata", {}) or {}
            src = meta.get("source")
            if src not in REPO_SOURCES:
                continue
            repo = meta.get("repo") or "unknown"
            slot = per_repo.setdefault(repo, {"commit": 0, "file": 0})
            if src == "repo-commit":
                slot["commit"] += 1
            else:
                slot["file"] += 1
        commit_docs = sum(v["commit"] for v in per_repo.values())
        file_docs = sum(v["file"] for v in per_repo.values())
        return {
            "repos": len(per_repo),
            "total_docs": commit_docs + file_docs,
            "commit_docs": commit_docs,
            "file_docs": file_docs,
            "per_repo": per_repo,
        }

    def render_metrics(snap):
        """Render the cached counts in Prometheus text exposition format."""
        out = []

        def esc(value):
            return value.replace("\\", "\\\\").replace('"', '\\"').replace("\n", " ")

        out.append("# HELP r2r_repos_total Repos in the R2R vector store.")
        out.append("# TYPE r2r_repos_total gauge")
        out.append("r2r_repos_total %d" % snap.get("repos", 0))
        out.append("# HELP r2r_documents_total Total repo documents (commit+file).")
        out.append("# TYPE r2r_documents_total gauge")
        out.append("r2r_documents_total %d" % snap.get("total_docs", 0))
        out.append("# HELP r2r_repo_documents Repo documents by repo and source.")
        out.append("# TYPE r2r_repo_documents gauge")
        for repo, counts in (snap.get("per_repo") or {}).items():
            name = esc(repo)
            out.append('r2r_repo_documents{repo="%s",source="commit"} %d' % (name, counts.get("commit", 0)))
            out.append('r2r_repo_documents{repo="%s",source="file"} %d' % (name, counts.get("file", 0)))
        out.append("# HELP r2r_stats_up 1 if the last R2R scan succeeded, else 0.")
        out.append("# TYPE r2r_stats_up gauge")
        out.append("r2r_stats_up %d" % (1 if snap.get("ok") else 0))
        out.append("# HELP r2r_stats_last_success_timestamp_seconds Unix time of last successful scan.")
        out.append("# TYPE r2r_stats_last_success_timestamp_seconds gauge")
        out.append("r2r_stats_last_success_timestamp_seconds %d" % snap.get("updated", 0))
        out.append("# HELP r2r_scan_duration_seconds Wall time of the last R2R scan.")
        out.append("# TYPE r2r_scan_duration_seconds gauge")
        out.append("r2r_scan_duration_seconds %f" % snap.get("duration", 0.0))
        out.append("# HELP r2r_scan_errors_total Total failed R2R scans since start.")
        out.append("# TYPE r2r_scan_errors_total counter")
        out.append("r2r_scan_errors_total %d" % snap.get("errors_total", 0))
        return "\n".join(out) + "\n"

    def refresh_loop():
        while True:
            started = time.time()
            try:
                data = compute()
                took = time.time() - started
                with _lock:
                    _cache.update(data)
                    _cache["ok"] = True
                    _cache["error"] = None
                    _cache["updated"] = int(time.time())
                    _cache["duration"] = took
                print(
                    "scan ok repos=%d total=%d commit=%d file=%d took=%.2fs"
                    % (data["repos"], data["total_docs"], data["commit_docs"],
                       data["file_docs"], took),
                    flush=True,
                )
            except Exception as exc:  # noqa: BLE001 - report, never crash the loop
                with _lock:
                    _cache["ok"] = False
                    _cache["error"] = str(exc)
                    _cache["duration"] = time.time() - started
                    _cache["errors_total"] += 1
                print("scan error: %s" % exc, flush=True)
            time.sleep(CACHE_TTL)

    class Handler(BaseHTTPRequestHandler):
        def _send(self, code, payload):
            body = json.dumps(payload).encode()
            self.send_response(code)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def do_GET(self):
            if self.path.startswith("/healthz"):
                self._send(200, {"status": "ok"})
                return
            if self.path.startswith("/stats.json"):
                with _lock:
                    snapshot = dict(_cache)
                self._send(200, snapshot)
                return
            if self.path.startswith("/metrics"):
                with _lock:
                    snapshot = dict(_cache)
                body = render_metrics(snapshot).encode()
                self.send_response(200)
                self.send_header("Content-Type", "text/plain; version=0.0.4")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)
                return
            self._send(404, {"error": "not found"})

        def log_message(self, *args):
            pass  # quiet access logs

    if __name__ == "__main__":
        threading.Thread(target=refresh_loop, daemon=True).start()
        ThreadingHTTPServer(("0.0.0.0", PORT), Handler).serve_forever()
