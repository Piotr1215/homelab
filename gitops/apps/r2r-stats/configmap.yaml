---
# r2r-stats: tiny stdlib HTTP service that serves cached R2R repo-vector-map
# counts for the Homepage customapi widget. Inline-Python on python-slim (no
# custom image), same pattern as the neighboring r2r cronjob. Counting logic
# mirrors ~/.claude/scripts/__r2r_repo_manage.py: page /documents, filter by
# metadata.source in {repo-commit, repo-file}, group by metadata.repo.
apiVersion: v1
kind: ConfigMap
metadata:
  name: r2r-stats-script
  namespace: ai-tools
  labels:
    app.kubernetes.io/name: r2r-stats
data:
  server.py: |
    import json
    import os
    import ssl
    import threading
    import time
    import urllib.error
    import urllib.request
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    R2R_URL = os.environ.get("R2R_URL", "http://r2r-api.ai-tools.svc:7272/v3").rstrip("/")
    CACHE_TTL = int(os.environ.get("CACHE_TTL_SECONDS", "300"))
    PAGE = int(os.environ.get("PAGE_SIZE", "500"))
    PORT = int(os.environ.get("PORT", "8080"))
    REPO_SOURCES = {"repo-commit", "repo-file"}

    # R2R over the in-cluster service is plain HTTP; this ctx only matters if
    # R2R_URL is pointed at the self-signed https tailnet endpoint.
    _ssl_ctx = ssl.create_default_context()
    _ssl_ctx.check_hostname = False
    _ssl_ctx.verify_mode = ssl.CERT_NONE

    _lock = threading.Lock()
    _cache = {
        "repos": 0,
        "total_docs": 0,
        "commit_docs": 0,
        "file_docs": 0,
        "per_repo": {},
        "updated": 0,
        "ok": False,
        "error": None,
    }

    def r2r_get(path):
        req = urllib.request.Request(R2R_URL + path, headers={"Accept": "application/json"})
        with urllib.request.urlopen(req, timeout=30, context=_ssl_ctx) as resp:
            return json.loads(resp.read().decode())

    def iter_documents():
        """Yield every document across all pages of GET /documents."""
        offset = 0
        while True:
            page = r2r_get("/documents?limit=%d&offset=%d" % (PAGE, offset))
            results = page.get("results", []) or []
            total = page.get("total_entries", 0) or 0
            for doc in results:
                yield doc
            offset += len(results)
            if not results or offset >= total:
                break

    def compute():
        per_repo = {}
        for doc in iter_documents():
            meta = doc.get("metadata", {}) or {}
            src = meta.get("source")
            if src not in REPO_SOURCES:
                continue
            repo = meta.get("repo") or "unknown"
            slot = per_repo.setdefault(repo, {"commit": 0, "file": 0})
            if src == "repo-commit":
                slot["commit"] += 1
            else:
                slot["file"] += 1
        commit_docs = sum(v["commit"] for v in per_repo.values())
        file_docs = sum(v["file"] for v in per_repo.values())
        return {
            "repos": len(per_repo),
            "total_docs": commit_docs + file_docs,
            "commit_docs": commit_docs,
            "file_docs": file_docs,
            "per_repo": per_repo,
        }

    def refresh_loop():
        while True:
            try:
                data = compute()
                with _lock:
                    _cache.update(data)
                    _cache["ok"] = True
                    _cache["error"] = None
                    _cache["updated"] = int(time.time())
            except Exception as exc:  # noqa: BLE001 - report, never crash the loop
                with _lock:
                    _cache["ok"] = False
                    _cache["error"] = str(exc)
            time.sleep(CACHE_TTL)

    class Handler(BaseHTTPRequestHandler):
        def _send(self, code, payload):
            body = json.dumps(payload).encode()
            self.send_response(code)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def do_GET(self):
            if self.path.startswith("/healthz"):
                self._send(200, {"status": "ok"})
                return
            if self.path.startswith("/stats.json"):
                with _lock:
                    snapshot = dict(_cache)
                self._send(200, snapshot)
                return
            self._send(404, {"error": "not found"})

        def log_message(self, *args):
            pass  # quiet access logs

    if __name__ == "__main__":
        threading.Thread(target=refresh_loop, daemon=True).start()
        ThreadingHTTPServer(("0.0.0.0", PORT), Handler).serve_forever()
