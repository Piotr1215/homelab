---
# Grafana dashboard for the R2R repo vector store, auto-imported by the
# kube-prometheus-stack grafana dashboard sidecar (label grafana_dashboard=1).
# Prometheus panels come from r2r-stats /metrics (ServiceMonitor); the logs
# panel reads r2r-stats stdout collected by promtail into Loki.
apiVersion: v1
kind: ConfigMap
metadata:
  name: r2r-stats-dashboard
  namespace: prometheus
  labels:
    grafana_dashboard: "1"
    app: kube-prometheus-stack-grafana
data:
  r2r-stats-dashboard.json: |
    {
      "annotations": {"list": [
        {"builtIn": 1, "datasource": {"type": "grafana", "uid": "-- Grafana --"}, "enable": true, "hide": true, "iconColor": "rgba(0, 211, 255, 1)", "name": "Annotations & Alerts", "type": "dashboard"}
      ]},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "refresh": "1m",
      "schemaVersion": 39,
      "tags": ["r2r", "homelab"],
      "templating": {"list": []},
      "time": {"from": "now-30d", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "R2R Vector Store",
      "uid": "r2r-vector-store",
      "version": 1,
      "panels": [
        {
          "id": 1, "type": "stat", "title": "Repos",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 5, "x": 0, "y": 0},
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "value", "graphMode": "none", "justifyMode": "auto"},
          "targets": [{"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "r2r_repos_total", "instant": true}]
        },
        {
          "id": 2, "type": "stat", "title": "Total Docs",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 5, "x": 5, "y": 0},
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "value", "graphMode": "area", "justifyMode": "auto"},
          "targets": [{"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "r2r_documents_total", "instant": true}]
        },
        {
          "id": 3, "type": "stat", "title": "Commit Docs",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 5, "x": 10, "y": 0},
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "purple", "value": null}]}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "value", "graphMode": "none", "justifyMode": "auto"},
          "targets": [{"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum(r2r_repo_documents{source=\"commit\"})", "instant": true}]
        },
        {
          "id": 4, "type": "stat", "title": "File Docs",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 5, "x": 15, "y": 0},
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "orange", "value": null}]}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "value", "graphMode": "none", "justifyMode": "auto"},
          "targets": [{"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum(r2r_repo_documents{source=\"file\"})", "instant": true}]
        },
        {
          "id": 5, "type": "stat", "title": "Last Sync",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 4, "x": 20, "y": 0},
          "fieldConfig": {"defaults": {"unit": "dateTimeFromNow", "color": {"mode": "fixed", "fixedColor": "text"}}, "overrides": []},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "textMode": "auto", "colorMode": "none", "graphMode": "none", "justifyMode": "auto"},
          "targets": [{"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "r2r_stats_last_success_timestamp_seconds * 1000", "instant": true}]
        },
        {
          "id": 6, "type": "table", "title": "Repositories",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 9, "w": 12, "x": 0, "y": 4},
          "fieldConfig": {"defaults": {"custom": {"align": "auto", "filterable": true}}, "overrides": []},
          "options": {"showHeader": true, "sortBy": [{"displayName": "Total", "desc": true}], "footer": {"show": true, "reducer": ["sum"], "countRows": false, "fields": ""}},
          "targets": [
            {"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum by (repo) (r2r_repo_documents{source=\"commit\"})", "instant": true, "format": "table", "legendFormat": "{{repo}}"},
            {"refId": "B", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum by (repo) (r2r_repo_documents{source=\"file\"})", "instant": true, "format": "table", "legendFormat": "{{repo}}"}
          ],
          "transformations": [
            {"id": "merge", "options": {}},
            {"id": "organize", "options": {"excludeByName": {"Time": true, "Time 1": true, "Time 2": true}, "renameByName": {"repo": "Repo", "Value #A": "Commit", "Value #B": "File"}, "indexByName": {}}},
            {"id": "calculateField", "options": {"mode": "binary", "alias": "Total", "binary": {"left": "Commit", "operator": "+", "right": "File"}, "reduce": {"reducer": "sum"}}}
          ]
        },
        {
          "id": 7, "type": "timeseries", "title": "Growth over time",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 9, "w": 12, "x": 12, "y": 4},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 10, "showPoints": "never", "lineWidth": 2}}, "overrides": []},
          "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true, "calcs": []}, "tooltip": {"mode": "multi", "sort": "desc"}},
          "targets": [
            {"refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "r2r_documents_total", "legendFormat": "total"},
            {"refId": "B", "datasource": {"type": "prometheus", "uid": "prometheus"}, "expr": "sum by (repo) (r2r_repo_documents)", "legendFormat": "{{repo}}"}
          ]
        },
        {
          "id": 8, "type": "logs", "title": "Recent Sync Logs",
          "datasource": {"type": "loki", "uid": "loki"},
          "gridPos": {"h": 9, "w": 24, "x": 0, "y": 13},
          "options": {"showTime": true, "showLabels": false, "showCommonLabels": false, "wrapLogMessage": true, "prettifyLogMessage": false, "enableLogDetails": true, "dedupStrategy": "none", "sortOrder": "Descending"},
          "targets": [{"refId": "A", "datasource": {"type": "loki", "uid": "loki"}, "expr": "{namespace=\"ai-tools\", pod=~\"r2r-stats.*\"}", "queryType": "range"}]
        }
      ]
    }
