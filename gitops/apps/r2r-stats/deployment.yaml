---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: r2r-stats
  namespace: ai-tools
  labels:
    app.kubernetes.io/name: r2r-stats
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: r2r-stats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: r2r-stats
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: r2r-stats
          image: python:3.14-slim
          command: ["python", "/app/server.py"]
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: R2R_URL
              value: http://r2r-api.ai-tools.svc:7272/v3
            - name: CACHE_TTL_SECONDS
              value: "300"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 60
          volumeMounts:
            - name: script
              mountPath: /app
      volumes:
        - name: script
          configMap:
            name: r2r-stats-script
---
apiVersion: v1
kind: Service
metadata:
  name: r2r-stats
  namespace: ai-tools
  labels:
    app.kubernetes.io/name: r2r-stats
spec:
  selector:
    app.kubernetes.io/name: r2r-stats
  ports:
    - port: 8080
      targetPort: http
      name: http
