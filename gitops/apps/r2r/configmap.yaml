---
apiVersion: v1
kind: ConfigMap
metadata:
  name: r2r-config
  namespace: ai-tools
  labels:
    app.kubernetes.io/name: r2r
    app.kubernetes.io/instance: r2r
    app.kubernetes.io/component: api
data:
  r2r.toml: |
    [completion]
    provider = "litellm"
    concurrent_request_limit = 16

    [app]
    quality_llm = "anthropic/claude-3-5-haiku-latest"
    fast_llm = "anthropic/claude-3-5-haiku-latest"

    [embedding]
    provider = "ollama"
    base_model = "nomic-embed-text"
    base_dimension = 768

    [completion_embedding]
    provider = "ollama"
    base_model = "nomic-embed-text"
    base_dimension = 768

    [ingestion]
    provider = "r2r"
    skip_document_summary = true

    [orchestration]
    provider = "simple"
