---
apiVersion: v1
kind: ConfigMap
metadata:
  name: r2r-memory-sync-script
  namespace: ai-tools
  labels:
    app.kubernetes.io/name: r2r
    app.kubernetes.io/instance: r2r
    app.kubernetes.io/component: sync
data:
  sync.py: |
    #!/usr/bin/env python3
    """Sync agent-memory into R2R. Full reconciliation each run:
    enumerate all memories, diff against R2R inventory, create/delete as needed.
    """
    import json
    import os
    import socket
    import ssl
    import urllib.parse
    import urllib.request
    import uuid

    # SSL context for self-signed certs (local testing via https)
    _ssl_ctx = ssl.create_default_context()
    _ssl_ctx.check_hostname = False
    _ssl_ctx.verify_mode = ssl.CERT_NONE

    R2R_URL = os.environ.get("R2R_URL", "http://r2r-api.ai-tools.svc:7272/v3")
    REDIS_URL = os.environ.get("REDIS_URL", "redis://agent-memory-redis.ai-tools.svc:6379")
    NTFY_URL = os.environ.get("NTFY_URL", "https://ntfy.sh/homelab-piotr1215-warning")
    NAMESPACE = uuid.UUID("b2c3d4e5-f6a7-8901-bcde-f12345678901")

    # Skip e2e-test memories — they're transient test data
    SKIP_NAMESPACES = {"e2e-test"}

    def send_ntfy(title, message, priority="4", tags="warning,r2r,memory"):
        try:
            req = urllib.request.Request(NTFY_URL, data=message.encode(), headers={
                "Title": title, "Priority": priority, "Tags": tags,
            })
            urllib.request.urlopen(req, timeout=5, context=_ssl_ctx)
        except Exception:
            pass

    def mem_doc_id(mem_id):
        """Deterministic R2R document UUID from memory ID."""
        return str(uuid.uuid5(NAMESPACE, f"memory:{mem_id}"))

    # --- minimal pure-stdlib RESP client (python:3.14-slim has no redis-py,
    #     and a runtime `pip install` would make every run depend on PyPI) ---

    def _redis_conn():
        u = urllib.parse.urlparse(REDIS_URL)
        s = socket.create_connection((u.hostname, u.port or 6379), timeout=15)
        return s, s.makefile("rb")

    def _resp_read(f):
        line = f.readline()
        if not line:
            raise EOFError("redis: empty reply")
        t, rest = line[:1], line[1:].strip()
        if t == b"+":
            return rest.decode()
        if t == b"-":
            raise Exception("redis error: " + rest.decode())
        if t == b":":
            return int(rest)
        if t == b"$":
            n = int(rest)
            if n == -1:
                return None
            data = f.read(n)
            f.read(2)  # trailing CRLF
            return data
        if t == b"*":
            n = int(rest)
            if n == -1:
                return None
            return [_resp_read(f) for _ in range(n)]
        raise Exception("redis: bad RESP " + repr(line))

    def _resp_cmd(s, f, *args):
        buf = b"*%d\r\n" % len(args)
        for a in args:
            a = a if isinstance(a, bytes) else str(a).encode()
            buf += b"$%d\r\n%s\r\n" % (len(a), a)
        s.sendall(buf)
        return _resp_read(f)

    def fetch_all_memories():
        """Enumerate ALL memories straight from the memory server's redis.

        The MCP/REST search endpoint is semantic KNN: with an empty query it
        returns the same top-ranked ~1200 rows on every page and never reaches
        the tail, so offset paging yields ~800 duplicates and silently drops
        ~800 real memories. That made the sync flag those memories' R2R docs as
        orphans and churn ~876 deletes + ~150 creates every run until it hit
        DeadlineExceeded. Redis SCAN is the only complete, stable enumeration
        (one memory_idx:* hash per memory). Couples to the memory server's redis
        schema by necessity: no list/enumerate endpoint exists on the API.
        """
        s, f = _redis_conn()
        try:
            cursor = "0"
            keys = []
            while True:
                cur, batch = _resp_cmd(s, f, "SCAN", cursor, "MATCH", "memory_idx:*", "COUNT", 500)
                cursor = cur.decode() if isinstance(cur, bytes) else str(cur)
                keys.extend(k.decode() for k in batch)
                if cursor == "0":
                    break
            out = []
            for k in keys:
                vals = _resp_cmd(s, f, "HMGET", k, "id_", "text", "topics", "namespace", "created_at")
                v = [x.decode() if isinstance(x, bytes) else x for x in vals]
                mid = v[0] or ""
                if not mid:
                    continue
                raw_topics = v[2] or ""
                out.append({
                    "id": mid,
                    "text": v[1] or "",
                    "topics": [t for t in raw_topics.split(",") if t],
                    "namespace": v[3] or "default",
                    "created_at": v[4] or "",
                })
            return out
        finally:
            s.close()

    def fetch_r2r_memory_docs():
        """Get all agent-memory documents currently in R2R. Returns {doc_id: memory_id}.

        Pages through the FULL document set and filters by metadata.source.
        The store also holds thousands of non-memory docs (repo-vector maps,
        claude sessions, obsidian, vcluster-docs). An unpaginated limit=500
        only revealed a fraction of the memory docs, so the sync thought the
        rest were missing and re-ingested ~1600 memories every run until it
        hit DeadlineExceeded. Full pagination makes to_create ~0 at steady
        state so a run finishes in seconds.
        """
        docs = {}
        offset = 0
        page = 500
        try:
            while True:
                req = urllib.request.Request(
                    f"{R2R_URL}/documents?limit={page}&offset={offset}",
                    headers={"Content-Type": "application/json"},
                )
                with urllib.request.urlopen(req, timeout=30, context=_ssl_ctx) as resp:
                    data = json.loads(resp.read())
                results = data.get("results", []) or []
                for doc in results:
                    meta = doc.get("metadata", {}) or {}
                    if meta.get("source") == "agent-memory":
                        docs[doc.get("id", "")] = meta.get("memory_id", "")
                offset += len(results)
                total = data.get("total_entries", 0) or 0
                if not results or offset >= total:
                    break
        except Exception as e:
            print(f"WARNING: could not list R2R docs: {e}")
        return docs

    def delete_r2r_doc(doc_id):
        """Delete a document from R2R."""
        try:
            req = urllib.request.Request(f"{R2R_URL}/documents/{doc_id}", method="DELETE")
            urllib.request.urlopen(req, timeout=5, context=_ssl_ctx)
            return True
        except Exception:
            return False

    def ingest_memory(mem):
        """Ingest a single memory into R2R with deterministic doc ID."""
        mem_id = mem.get("id", "")
        text = mem.get("text", "").strip()
        if not text or len(text) < 20:
            return False

        topics = mem.get("topics", [])
        namespace = mem.get("namespace") or "default"
        doc_id = mem_doc_id(mem_id)

        title = f"memory-{mem_id[:12]}"

        boundary = "----SyncBoundary"
        body = []
        body.append(f"--{boundary}\r\nContent-Disposition: form-data; name=\"id\"\r\n\r\n{doc_id}")
        body.append(f"--{boundary}\r\nContent-Disposition: form-data; name=\"raw_text\"\r\n\r\n{text}")
        metadata = json.dumps({
            "title": title,
            "source": "agent-memory",
            "namespace": namespace,
            "topics": topics,
            "memory_id": mem_id,
            "created_at": mem.get("created_at", ""),
        })
        body.append(f"--{boundary}\r\nContent-Disposition: form-data; name=\"metadata\"\r\n\r\n{metadata}")
        body.append(f"--{boundary}--")
        data = "\r\n".join(body).encode()

        req = urllib.request.Request(
            f"{R2R_URL}/documents",
            data=data,
            headers={"Content-Type": f"multipart/form-data; boundary={boundary}"},
        )
        try:
            # 30s: idle ingest is ~3s, but server-side embedding can slow under
            # the one-time backfill load; a false timeout just retries next run.
            with urllib.request.urlopen(req, timeout=30, context=_ssl_ctx) as resp:
                result = json.loads(resp.read())
                return bool(result.get("results", {}).get("document_id"))
        except Exception as e:
            print(f"FAIL ingest {mem_id[:12]}: {e}")
            return False

    def main():
        print("Full reconciliation: enumerating all memories from redis...")
        try:
            memories = fetch_all_memories()
        except Exception as e:
            send_ntfy("R2R Memory Sync Failed", f"Could not enumerate memories from redis: {e}",
                       priority="5", tags="rotating_light,r2r,memory")
            raise

        # Filter out e2e-test and short memories
        real = [m for m in memories if m.get("namespace") not in SKIP_NAMESPACES]
        print(f"Found {len(memories)} total, {len(real)} real (skipped {len(memories) - len(real)} e2e-test)")

        if len(real) == 0:
            send_ntfy("R2R Memory Sync Warning",
                       "0 memories returned from redis — possible server-side error",
                       priority="4", tags="warning,r2r,memory")
            return

        # Build expected doc IDs from memories
        expected = {}
        for mem in real:
            mid = mem.get("id", "")
            if mid:
                expected[mem_doc_id(mid)] = mem

        # Get current R2R inventory
        r2r_docs = fetch_r2r_memory_docs()
        print(f"R2R has {len(r2r_docs)} memory docs currently")

        # Determine actions
        to_create = {did: expected[did] for did in expected if did not in r2r_docs}
        to_delete = {did: r2r_docs[did] for did in r2r_docs if did not in expected}
        already_synced = len(expected) - len(to_create)

        print(f"Actions: {len(to_create)} create, {len(to_delete)} delete, {already_synced} unchanged")

        # Delete stale docs (memory deleted from agent-memory)
        deleted = 0
        for doc_id, mem_id in to_delete.items():
            if delete_r2r_doc(doc_id):
                deleted += 1
                print(f"  deleted {doc_id[:8]} (memory {mem_id[:12]})")

        # Create missing docs
        created = 0
        failed = 0
        for doc_id, mem in to_create.items():
            # Delete first in case of orphaned doc with same ID
            delete_r2r_doc(doc_id)
            if ingest_memory(mem):
                created += 1
            else:
                failed += 1

        print(f"Done: {created} created, {deleted} deleted, {failed} failed, {already_synced} unchanged")

        if failed > 0:
            send_ntfy("R2R Memory Sync Partial Failure",
                       f"{failed} memories failed to ingest into R2R")

    if __name__ == "__main__":
        main()
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: r2r-memory-sync
  namespace: ai-tools
  labels:
    app.kubernetes.io/name: r2r
    app.kubernetes.io/instance: r2r
    app.kubernetes.io/component: sync
spec:
  schedule: "0 * * * *"  # every hour
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      # Steady-state runs finish in seconds (to_create/to_delete ~0). The one-
      # time backfill after the redis-enumeration fix creates ~800 docs at ~3s
      # each (server-side embedding), so ~2600s. 3000s covers that in a single
      # pass while staying under the hourly schedule (3600s); concurrencyPolicy
      # Forbid prevents overlap, and a partial run is self-healing (created docs
      # persist, next run finishes the rest) now that deletes no longer churn.
      activeDeadlineSeconds: 3000
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: sync
              image: python:3.14-slim
              command: ["python3", "/scripts/sync.py"]
              env:
                - name: R2R_URL
                  value: "http://r2r-api.ai-tools.svc:7272/v3"
                - name: REDIS_URL
                  value: "redis://agent-memory-redis.ai-tools.svc:6379"
              volumeMounts:
                - name: script
                  mountPath: /scripts
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
          volumes:
            - name: script
              configMap:
                name: r2r-memory-sync-script
