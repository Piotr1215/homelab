---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: r2r-db-data
  namespace: ai-tools
  labels:
    app.kubernetes.io/name: r2r-db
    app.kubernetes.io/instance: r2r
    app.kubernetes.io/component: database
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: r2r-db
  namespace: ai-tools
  labels:
    app.kubernetes.io/name: r2r-db
    app.kubernetes.io/instance: r2r
    app.kubernetes.io/component: database
spec:
  serviceName: r2r-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: r2r-db
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: r2r-db
        app.kubernetes.io/instance: r2r
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg17
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: r2r
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: r2r-db-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: r2r-db-credentials
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            exec:
              command:
                - pg_isready
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: r2r-db-data
        - name: init
          configMap:
            name: r2r-db-init
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: r2r-db-init
  namespace: ai-tools
  labels:
    app.kubernetes.io/name: r2r-db
    app.kubernetes.io/instance: r2r
    app.kubernetes.io/component: database
data:
  01-extensions.sql: |
    CREATE EXTENSION IF NOT EXISTS "vector";
---
apiVersion: v1
kind: Service
metadata:
  name: r2r-db-rw
  namespace: ai-tools
  labels:
    app.kubernetes.io/name: r2r-db
    app.kubernetes.io/instance: r2r
    app.kubernetes.io/component: database
spec:
  selector:
    app.kubernetes.io/name: r2r-db
    app.kubernetes.io/component: database
  ports:
    - port: 5432
      targetPort: postgres
      name: postgres
