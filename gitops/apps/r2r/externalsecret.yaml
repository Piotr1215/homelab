---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: r2r-db-credentials
  namespace: ai-tools
  labels:
    app.kubernetes.io/name: r2r-db
    app.kubernetes.io/instance: r2r
    app.kubernetes.io/component: database
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: r2r-db-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: r2r-db-username
    - secretKey: password
      remoteRef:
        key: r2r-db-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: r2r-secret-key
  namespace: ai-tools
  labels:
    app.kubernetes.io/name: r2r
    app.kubernetes.io/instance: r2r
    app.kubernetes.io/component: api
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: r2r-secret-key
    creationPolicy: Owner
  data:
    - secretKey: secret-key
      remoteRef:
        key: r2r-secret-key
