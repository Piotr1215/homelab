apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: vcluster-mcp-alerts
  namespace: prometheus
  labels:
    release: kube-prometheus-stack
    prometheus: kube-prometheus-stack-prometheus
    role: alert-rules
spec:
  groups:
  - name: vcluster-mcp-usage
    interval: 30s
    rules:
    - alert: VClusterMCPToolUsed
      expr: |
        rate(mcp_requests_total{job="vcluster-yaml-mcp",mcp_method="tools/call"}[5m]) > 0
      for: 10s
      labels:
        severity: info
        component: vcluster-mcp
      annotations:
        summary: "vCluster YAML MCP tool called"
        description: "Tool {{ $labels.tool_name }} called ({{ $value }} req/sec)"
