---
# Helm chart apps with external sources
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps-helm
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - app: kubernetes-dashboard
            namespace: kubernetes-dashboard
            chartRepo: https://kubernetes.github.io/dashboard/
            chartName: kubernetes-dashboard
            chartVersion: "7.14.0"
            createNamespace: "false"
          - app: forgejo
            namespace: git-mirror
            chartRepo: oci://code.forgejo.org/forgejo-helm/forgejo
            chartName: forgejo
            chartVersion: "8.0.0"
            createNamespace: "false"
          - app: pyroscope
            namespace: pyroscope
            chartRepo: https://grafana.github.io/helm-charts
            chartName: pyroscope
            chartVersion: "1.16.0"
            createNamespace: "true"
  template:
    metadata:
      name: "{{ .app }}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: applications
      sources:
        # Helm chart
        - repoURL: "{{ .chartRepo }}"
          chart: "{{ .chartName }}"
          targetRevision: "{{ .chartVersion }}"
          helm:
            releaseName: "{{ .app }}"
            valueFiles:
              - $values/gitops/apps/{{ .app }}/values.yaml
        # Values reference
        - repoURL: https://github.com/Piotr1215/homelab.git
          targetRevision: HEAD
          ref: values
        # Extra K8s resources
        - repoURL: https://github.com/Piotr1215/homelab.git
          targetRevision: HEAD
          path: gitops/apps/{{ .app }}
          directory:
            exclude: "values.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .namespace }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace={{ .createNamespace | default "false" }}
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
